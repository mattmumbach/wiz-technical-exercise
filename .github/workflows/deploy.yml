name: Deploy Wiz Exercise

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: wiz-exercise-cluster
  ECR_REPO: attack-path-express
  K8S_DIR: k8s

jobs:
  # ---------------------------------------------------------
  # JOB 1: Infrastructure as Code (IaC)
  # ---------------------------------------------------------
  terraform:
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.get-outputs.outputs.ecr_uri }}
      mongo_ip: ${{ steps.get-outputs.outputs.mongo_ip }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS Credentials (Access Keys Fallback)
        if: ${{ secrets.AWS_ROLE_ARN == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Check AWS identity (Terraform job)
        run: |
          echo "AWS_ROLE_ARN=${{ secrets.AWS_ROLE_ARN }}"
          aws sts get-caller-identity || true

      - name: Bootstrap Terraform State Bucket
        run: |
          aws s3api create-bucket \
            --bucket wiz-exercise-tfstate-864899846082 \
            --region us-east-1 2>/dev/null || echo "State bucket already exists"
          aws s3api put-bucket-versioning \
            --bucket wiz-exercise-tfstate-864899846082 \
            --versioning-configuration Status=Enabled

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # Security Scan: Checkov for IaC
      - name: Security Scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Get Outputs
        id: get-outputs
        run: |
          echo "mongo_ip=$(terraform output -raw mongodb_private_ip)" >> $GITHUB_OUTPUT
          # Get ECR URI (might fail if repo doesn't exist yet, handle gracefully)
          ECR_URI=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} --query 'repositories[0].repositoryUri' --output text 2>/dev/null || echo "pending")
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------
  # JOB 2: Build & Deploy Application
  # ---------------------------------------------------------
  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS Credentials (Access Keys Fallback)
        if: ${{ secrets.AWS_ROLE_ARN == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr create-repository --repository-name ${{ env.ECR_REPO }} --image-scanning-configuration scanOnPush=true --image-tag-mutability MUTABLE || echo "ECR repository already exists"

      - name: Check AWS identity (deploy job)
        run: |
          echo "AWS_ROLE_ARN=${{ secrets.AWS_ROLE_ARN }}"
          aws sts get-caller-identity || true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO }}:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/${{ env.ECR_REPO }}:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/${{ env.ECR_REPO }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Security Scan: Trivy for Container Image
      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Update K8s Manifests
        run: |
          MONGO_IP=${{ needs.terraform.outputs.mongo_ip }}
          ECR_IMAGE=${{ steps.build-image.outputs.image }}
          
          # Replace placeholders
          sed -i "s|<ECR_URI>|${ECR_IMAGE}|g" ${{ env.K8S_DIR }}/deployment.yaml
          sed -i "s|<MONGO_IP>|${MONGO_IP}|g" ${{ env.K8S_DIR }}/deployment.yaml

          echo "Updated deployment.yaml with ECR Image: ${ECR_IMAGE}"
          echo "Updated deployment.yaml with Mongo IP: ${MONGO_IP}"
          cat ${{ env.K8S_DIR }}/deployment.yaml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          kubectl apply -f ${{ env.K8S_DIR }}/serviceaccount.yaml
          kubectl apply -f ${{ env.K8S_DIR }}/service.yaml
          kubectl apply -f ${{ env.K8S_DIR }}/deployment.yaml

      - name: Wait for Deployment
        run: |
          kubectl rollout status deployment/attack-path-express --timeout=300s

      - name: Get Application URL
        run: |
          echo "Waiting for LoadBalancer to get an address..."
          sleep 30
          ADDRESS=$(kubectl get svc attack-path-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$ADDRESS" ]; then
            ADDRESS=$(kubectl get svc attack-path-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          fi
          if [ -z "$ADDRESS" ]; then
            echo "Could not find external LoadBalancer address for service attack-path-service"
            kubectl get svc attack-path-service
            exit 1
          fi
          echo "🚀 App deployed successfully at: http://${ADDRESS}"
          echo "app_url=http://${ADDRESS}" >> $GITHUB_OUTPUT